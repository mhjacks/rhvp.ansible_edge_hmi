---
# tasks file for kiosk_mode
- name: Gather facts
  ansible.builtin.setup:

- name: Select kiosk packages for RHEL 9 and newer
  ansible.builtin.set_fact:
    kiosk_packages:
      - gnome-kiosk
      - gnome-kiosk-script-session
    kiosk_session: gnome-kiosk-script
    kiosk_script_name: gnome-kiosk-script
  when: ansible_facts['distribution_major_version'] | int >= 9

- name: Ensure hostname set
  ansible.builtin.hostname:
    name: "{{ inventory_hostname.split('.')[0] }}"

- name: Register with RHSM using provided credentials
  community.general.redhat_subscription:
    state: present
    username: "{{ rhsm_username }}"
    password: "{{ rhsm_password }}"
    auto_attach: "{{ rhsm_auto_attach }}"

- name: Upgrade all packages
  ansible.builtin.dnf:
    name: "*"
    state: latest
    update_cache: true

- name: Install Gnome Desktop Environment
  ansible.builtin.dnf:
    name:
      - "@Server With GUI"
    skip_broken: true
    nobest: true
    state: present

- name: Install kiosk session packages
  ansible.builtin.dnf:
    name: "{{ kiosk_packages + kiosk_runtime_packages }}"
    state: present
  notify: Reboot

- name: Create gdm configuration for kiosk kiosk_mode
  ansible.builtin.template:
    src: custom.conf.j2
    dest: /etc/gdm/custom.conf
    mode: "0644"
  notify: Reboot

- name: Ensure kiosk group exists
  ansible.builtin.group:
    name: kiosk
    gid: 2000
    state: present

- name: Add the user 'kiosk'
  ansible.builtin.user:
    name: kiosk
    comment: kiosk user
    state: present
    shell: /bin/bash
    uid: 2000
    group: kiosk
    groups: users
    create_home: true
    skeleton: true
  notify: Reboot

- name: Clear kiosk user password for GDM autologin
  ansible.builtin.command:
    cmd: passwd -d kiosk
  register: kiosk_password_clear
  changed_when: kiosk_password_clear.rc == 0
  failed_when: kiosk_password_clear.rc != 0
  notify: Reboot

- name: Change default target to graphical.target
  ansible.builtin.file:
    src: /usr/lib/systemd/system/graphical.target
    dest: /etc/systemd/system/default.target
    state: link
  notify: Reboot

- name: Enable and start GDM
  ansible.builtin.systemd:
    name: gdm
    enabled: true
    state: started
  notify: Reboot

- name: Permit traffic in default zone for https service
  ansible.posix.firewalld:
    service: https
    permanent: true
    state: enabled

- name: Create kiosk user directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
    owner: kiosk
    group: kiosk
  loop:
    - /home/kiosk/.local/bin
    - /home/kiosk/Desktop
    - /home/kiosk/.config
    - /home/kiosk/.cache
    - /home/kiosk/.mozilla
    - /home/kiosk/.local/state
  notify: Reboot

- name: Disable GNOME initial setup for kiosk user
  ansible.builtin.file:
    path: "{{ item }}"
    state: touch
    mode: "0644"
    owner: kiosk
    group: kiosk
  loop:
    - /home/kiosk/.config/gnome-initial-setup-done
    - /home/kiosk/.local/state/gnome-initial-setup-done

- name: Disable GNOME initial setup globally
  ansible.builtin.template:
    src: gnome-initial-setup.j2
    dest: /etc/dconf/db/local.d/00-gnome-initial-setup
    mode: "0644"
  notify: Reboot

- name: Apply dconf changes
  ansible.builtin.command:
    cmd: dconf update
  changed_when: true

- name: Remove persisted desktop session overrides for kiosk user
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /home/kiosk/.dmrc
    - /home/kiosk/.xsession
    - /home/kiosk/.Xclients

- name: Create shell script to start firefox
  ansible.builtin.template:
    dest: "/home/kiosk/.local/bin/{{ kiosk_script_name }}"
    src: redhat-kiosk.j2
    mode: "0755"
    owner: kiosk
    group: kiosk
  notify: Reboot

- name: Configure session for kiosk username /var/lib/AccountsService/users/kiosk
  ansible.builtin.template:
    src: kiosk.conf.j2
    dest: /var/lib/AccountsService/users/kiosk
    mode: "0600"
  notify: Reboot

- name: Ensure kiosk home directory ownership
  ansible.builtin.file:
    path: /home/kiosk
    state: directory
    owner: kiosk
    group: kiosk
    recurse: true
  notify: Reboot

- name: Flush handlers (will reboot if needed)
  ansible.builtin.meta: flush_handlers
