---
# tasks file for container_lifecycle

# FIXME: properly handle template config changes

- name: Gather information about the current running container
  containers.podman.podman_container_info:
    name: afiot-{{ service_name }}
  register: pre_install_container_info

- name: Install Transaction
  when:
    - container_state in ["present", "installed"]
  block:
    - name: Pull down container image
      containers.podman.podman_image:
        name: "{{ container_image }}"
        tag: "{{ container_tag }}"
      when: >
        (not pre_install_container_info['containers']) or
        ((pre_install_container_info['containers'][0]['Name'] == "afiot-" + service_name) and
        pre_install_container_info['containers'][0]['ImageName'] != container_image + ":" + container_tag)

    - name: Template the quadlet container unit file
      ansible.builtin.template:
        src: templates/container.quadlet.j2
        dest: "{{ quadlet_units_dir }}/afiot-{{ service_name }}.container"
        mode: "0644"
      notify: Restart container service

    - name: Remove legacy systemd service unit file
      ansible.builtin.file:
        path: /etc/systemd/system/afiot-{{ service_name }}.service
        state: absent

    - name: Remove legacy systemd health check timer unit file
      ansible.builtin.file:
        path: /etc/systemd/system/afiot-{{ service_name }}-healthcheck.timer
        state: absent

    - name: Remove legacy systemd health check service unit file
      ansible.builtin.file:
        path: /etc/systemd/system/afiot-{{ service_name }}-healthcheck.service
        state: absent

    - name: Daemon reload systemd and start our service
      ansible.builtin.systemd:
        name: afiot-{{ service_name }}
        state: started
        enabled: true
        daemon_reload: true
      register: initial_start
  rescue:
    - name: Override container_tag for rollback
      ansible.builtin.set_fact:
        container_tag: "{{ pre_install_container_info['containers'][0]['ImageName'] | split(':') | last }}"

    - name: Template the quadlet container unit file
      ansible.builtin.template:
        src: templates/container.quadlet.j2
        dest: "{{ quadlet_units_dir }}/afiot-{{ service_name }}.container"
        mode: "0644"

    - name: Remove legacy systemd service unit file
      ansible.builtin.file:
        path: /etc/systemd/system/afiot-{{ service_name }}.service
        state: absent

    - name: Remove legacy systemd health check timer unit file
      ansible.builtin.file:
        path: /etc/systemd/system/afiot-{{ service_name }}-healthcheck.timer
        state: absent

    - name: Remove legacy systemd health check service unit file
      ansible.builtin.file:
        path: /etc/systemd/system/afiot-{{ service_name }}-healthcheck.service
        state: absent

    - name: Daemon reload systemd and start our service
      ansible.builtin.systemd:
        name: afiot-{{ service_name }}
        state: started
        enabled: true
        daemon_reload: true

- name: Uninstall Transaction
  when:
    - container_state in ["absent", "uninstalled"]
    - pre_install_container_info['containers']
  block:
    - name: Stop service
      ansible.builtin.systemd:
        name: afiot-{{ service_name }}
        state: stopped
        enabled: false

    - name: Remove container image
      containers.podman.podman_image:
        name: "{{ container_image }}"
        tag: "{{ container_tag }}"
        state: absent

    - name: Remove quadlet container unit file
      ansible.builtin.file:
        path: "{{ quadlet_units_dir }}/afiot-{{ service_name }}.container"
        state: absent

    - name: Remove legacy systemd service unit file
      ansible.builtin.file:
        path: /etc/systemd/system/afiot-{{ service_name }}.service
        state: absent

    - name: Remove legacy systemd health check timer unit file
      ansible.builtin.file:
        path: /etc/systemd/system/afiot-{{ service_name }}-healthcheck.timer
        state: absent

    - name: Remove legacy systemd health check service unit file
      ansible.builtin.file:
        path: /etc/systemd/system/afiot-{{ service_name }}-healthcheck.service
        state: absent

    - name: Daemon reload systemd to remove unit files from index
      ansible.builtin.systemd:
        daemon_reload: true
